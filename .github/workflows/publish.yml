name: Publish to PyPI

on:
  release:
    types: [published]

jobs:
  # Run full test suite before publishing
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" || pip install -e .
          pip install pytest ruff

      - name: Lint and format
        run: |
          ruff check goodhart/
          ruff format --check goodhart/

      - name: Test
        run: pytest -v

      - name: Verify version matches tag
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          PKG=$(python -c "import goodhart; print(goodhart.__version__)")
          if [ "$TAG" != "$PKG" ]; then
            echo "Tag v$TAG does not match package version $PKG"
            exit 1
          fi

      - name: Extract dataset
        run: |
          python evaluation/scripts/extract_dataset.py 2>&1 | tee /tmp/extract.log
          grep "0 errors" /tmp/extract.log || exit 1

  publish:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build
        run: |
          python -m pip install --upgrade pip
          pip install build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
