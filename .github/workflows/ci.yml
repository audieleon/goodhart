name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" || pip install -e .
          pip install pytest ruff

      - name: Lint
        run: ruff check goodhart/

      - name: Format check
        run: ruff format --check goodhart/

      - name: Run tests
        run: pytest -v

      - name: Extract dataset
        if: matrix.python-version == '3.12'
        run: |
          python evaluation/scripts/extract_dataset.py 2>&1 | tee /tmp/extract.log
          grep "0 errors" /tmp/extract.log || exit 1

  lean:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build LEAN proofs
        uses: leanprover/lean-action@v1
        with:
          build-args: ""
          use-mathlib-cache: true
          use-github-cache: true
          lake-package-directory: proofs
        timeout-minutes: 30

      - name: Verify zero sorry
        working-directory: proofs
        run: |
          if grep -r "sorry" GoodhartProofs/ --include="*.lean" | grep -v "^--" | grep -v "zero sorry" | grep -v "removed"; then
            echo "SORRY FOUND — proofs are incomplete"
            exit 1
          fi
