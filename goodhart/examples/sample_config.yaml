# goodhart sample configuration
# Run: goodhart --config sample_config.yaml

environment:
  name: "MultiRoom-N4-Monster"
  max_steps: 120
  n_states: 2000
  death_probability: 0.01

  reward_sources:
    - name: reach staircase
      type: terminal
      value: 1.0
      discovery_probability: 0.01

    # Uncomment to add step penalty (will trigger warnings):
    # - name: step penalty
    #   type: per_step
    #   value: -0.001

training:
  algorithm: APPO
  lr: 0.0002
  critic_lr: 0.00002
  entropy_coeff: 0.0001
  num_envs: 256
  n_actors: 256
  total_steps: 50000000
  num_specialists: 4
  routing_floor: 0.08
  balance_coef: 0.01
  use_rnn: true
  rnn_type: lstm
  rnn_size: 256
